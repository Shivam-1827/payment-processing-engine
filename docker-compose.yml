version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: payment_engine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d payment_engine"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payment_redis
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.2
    container_name: payment_kafka
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- INIT CONTAINERS ---
  db-migrations:
    image: migrate/migrate
    container_name: payment_migrations
    volumes:
      - ./infra/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://ledger_admin:supersecretpassword@postgres:5432/payment_engine?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  # --- APPLICATION SERVICES ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      redis:
        condition: service_started
      redpanda:
        condition: service_healthy

  cpp-sequencer:
    build:
      context: .
      dockerfile: services/sequencer/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile # Assuming you duplicated the Go Dockerfile
    environment:
      - DB_URL=postgres://ledger_admin:supersecretpassword@postgres:5432/payment_engine?sslmode=disable
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      db-migrations:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  webhook-service:
    build:
      context: .
      dockerfile: services/webhook-service/Dockerfile # Assuming you duplicated the Go Dockerfile
    environment:
      - DB_URL=postgres://ledger_admin:supersecretpassword@postgres:5432/payment_engine?sslmode=disable
    depends_on:
      db-migrations:
        condition: service_completed_successfully